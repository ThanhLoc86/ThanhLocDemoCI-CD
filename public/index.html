<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thanh Loc Demo - CI/CD</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 40px;
            max-width: 600px;
            text-align: center;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5em;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1em;
        }

        .info {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
            text-align: left;
        }

        .info p {
            color: #555;
            margin: 10px 0;
            line-height: 1.6;
        }

        .info strong {
            color: #333;
        }

        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 5px;
            font-size: 1em;
            cursor: pointer;
            margin: 10px 5px;
            transition: background 0.3s ease;
        }

        button:hover {
            background: #764ba2;
        }

        #status {
            margin-top: 20px;
            padding: 15px;
            background: #e8f5e9;
            border-left: 4px solid #4caf50;
            border-radius: 4px;
            color: #2e7d32;
            display: none;
        }

        .footer {
            margin-top: 30px;
            color: #999;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Thanh Loc Demo</h1>
        <p class="subtitle">Node.js + CI/CD Pipeline</p>

        <div class="info">
            <p><strong>📱 Ứng dụng Web đơn giản:</strong></p>
            <p>Trang web này được xây dựng bằng Node.js và Express, sẵn sàng cho CI/CD deployment.</p>
        </div>

        <div class="info">
            <p><strong>🛠️ Công nghệ sử dụng:</strong></p>
            <p>✓ Node.js<br>✓ Express.js<br>✓ HTML5 / CSS3<br>✓ Docker (sắp tới)</p>
        </div>

        <button onclick="checkStatus()">✓ Kiểm tra trạng thái</button>
        <button onclick="reloadPage()">🔄 Làm mới</button>

        <div id="status"></div>

        <div class="footer">
            <p>Sẵn sàng cho GitHub Actions & Docker Hub deployment 🐳</p>
        </div>
    </div>

    <script>
        function checkStatus() {
            fetch('/api/status')
                .then(response => response.json())
                .then(data => {
                    const statusDiv = document.getElementById('status');
                    statusDiv.innerHTML = `<strong>✓ Trạng thái:</strong> ${data.status}<br><strong>Thông báo:</strong> ${data.message}<br><strong>Thời gian:</strong> ${data.timestamp}`;
                    statusDiv.style.display = 'block';
                })
                .catch(error => console.error('Error:', error));
        }

        function reloadPage() {
            location.reload();
        }
    </script>
</body>
</html>
